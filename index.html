<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Optie Dashboard</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <header class="topbar">
    <h1>Optie Dashboard</h1>
    <span class="updated" id="updated"></span>
  </header>

  <main>
    <h2 class="section-title">AEX index</h2>
    <p class="section-note" id="aexSectionNote">Loading live data from <code>data/</code>&hellip;</p>

    <section class="stat-grid" id="aexStatGrid" aria-label="AEX key metrics"></section>

    <figure class="card" id="aexCard">
      <figcaption>
        <span class="card-title">AEX close price</span>
        <button class="table-toggle" data-target="aex">View as table</button>
      </figcaption>
      <div class="chart-wrap" id="aexChartWrap"></div>
      <div class="table-wrap hidden" id="aexTableWrap"></div>
    </figure>
  </main>

  <p class="note">AEX section is fetched live from <code>data/aex_history.csv</code> and <code>data/aex_history_summary.json</code>, refreshed by the <code>refresh-aex-data</code> skill.</p>
</div>

<script src="script.js"></script>
</body>
</html>
